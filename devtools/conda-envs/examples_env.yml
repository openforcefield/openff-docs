name: openff-docs-examples
channels:
  - conda-forge
dependencies:
  # Examples
  - openff-toolkit-examples =0.18
  - openff-interchange =0.5
  - openff-nagl =0.5
  # openff-fragmenter
  # Runtime
  - pip
  - python=3.11
  - setuptools_scm  # needed for get-tag-from-github automation
  - jupyterlab>=4
  - ipywidgets>=8
  # Cookbook
  - gitpython
  - nbconvert
  - nbformat
  - requests
  - packaging
  # Other deps
  - openff-qcsubmit
  - openmmforcefields =0.15
  - gromacs >=2021=nompi*
  - lammps
  - rich
  - jax
  - parmed >=4.3.1
  - nglview
  - psi4
  # NAGL training dependencies - constraints are just to help solver
  # hopefully will be replaced by openff-nagl-training in future
  - pyarrow =17
  - openff-recharge =0.5.3
  - dask-jobqueue
  - dgl =2.3.0
  # torchdata.datapipes was removed in 0.10.0
  - torchdata<=0.9.0
